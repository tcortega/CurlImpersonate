name: Native Library Tests

on:
  push:
    paths:
      - 'native/**'
      - '.github/workflows/native-tests.yml'
  pull_request:
    paths:
      - 'native/**'
      - '.github/workflows/native-tests.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential tcpdump nghttp2-client

      - name: Install Python dependencies
        run: |
          pip install pyyaml pytest pytest-asyncio pytest-xdist dpkt
          pip install git+https://github.com/lexiforest/th1.git@main

      - name: Fetch curl-impersonate binaries
        run: |
          cd native
          python fetch_dependencies.py

      - name: Build native library
        run: |
          cd native
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Run TLS fingerprint tests (parallel)
        run: |
          cd native/build/tests
          sudo python3 -m pytest test_impersonate.py::test_tls_client_hello \
            --install-dir . --capture-interface eth0 -v -n 4 --tb=short

      - name: Run HTTP/2 tests (parallel)
        run: |
          cd native/build/tests
          python3 -m pytest test_impersonate.py::test_http2_headers \
            --install-dir . -v -n 4 --tb=short

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          brew install cmake nghttp2

      - name: Install Python dependencies
        run: |
          pip3 install pyyaml pytest pytest-asyncio pytest-xdist dpkt
          pip3 install git+https://github.com/lexiforest/th1.git@main

      - name: Fetch curl-impersonate binaries
        run: |
          cd native
          python3 fetch_dependencies.py

      - name: Build native library
        run: |
          cd native
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Run TLS fingerprint tests (parallel)
        run: |
          cd native/build/tests
          sudo python3 -m pytest test_impersonate.py::test_tls_client_hello \
            --install-dir . --capture-interface en0 -v -n 4 --tb=short

      - name: Run HTTP/2 tests (parallel)
        run: |
          cd native/build/tests
          python3 -m pytest test_impersonate.py::test_http2_headers \
            --install-dir . -v -n 4 --tb=short
